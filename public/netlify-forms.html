<!DOCTYPE html>
<html>

  <head>
    <title>Netlify Forms Detection</title>
  </head>

  <body>
    <!--
      This file exists solely so Netlify's build-time crawler can detect
      the "contact" form. The actual submission is handled via fetch() in
      ContactModal.vue using application/x-www-form-urlencoded POST to "/".
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>

</html>
